<!DOCTYPE html>
<html>
<head>
    <title>Louisiana Land Loss Map</title>

    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        #map {
            height: 90vh;
        }

        h1 {
            text-align: center;
            margin: 10px;
        }

        p {
            text-align: center;
            margin-top: -5px;
        }
    </style>
</head>
<body>

<h1>Louisiana Land Loss & Restoration</h1>
<p>Explore coastal change and environmental risk</p>

<div id="map"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
    // Initialize map centered on Louisiana
    var map = L.map('map').setView([30.5, -91.5], 7);

    // Add basemap
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    // Example marker (you will replace later with real data)
    var marker = L.marker([29.95, -90.07]).addTo(map);

    marker.bindPopup("<b>New Orleans Area</b><br>Example coastal region.").openPopup();

</script>

</body>
</html>
