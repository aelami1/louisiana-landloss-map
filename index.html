<!DOCTYPE html>
<html>
<head>
  <title>Louisiana Land Loss Map</title>

  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    h1 {
      text-align: center;
      margin: 10px;
    }

    p {
      text-align: center;
      margin-top: -5px;
    }

    #map {
      height: 85vh;
      width: 100%;
    }
    .legend {
  background: white;
  padding: 10px;
  line-height: 18px;
  color: #333;
  border-radius: 5px;
}

.legend i {
  width: 18px;
  height: 18px;
  float: left;
  margin-right: 8px;
  opacity: 0.7;
}
  </style>
</head>

<body>

  <h1>Land Loss in Louisiana & Restoration Efforts</h1>
  <p>Explore coastal changes and environmental risk</p>

  <div id="map"></div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="https://unpkg.com/esri-leaflet/dist/esri-leaflet.js"></script>

  <script>
    var map = L.map('map').setView([30.0, -90.5], 7);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    var landLossLayer = L.geoJSON(null, {
      style: {
        color: "red",
        weight: 3,
        fillColor: "red",
        fillOpacity: 0.5
      },
      onEachFeature: function(feature, layer) {
        layer.bindPopup(
          "<b>" + feature.properties.name + "</b><br>" +
          "Risk: " + feature.properties.risk
        );
      }
    }).addTo(map);

    fetch('data/landloss.geojson')
      .then(response => response.json())
      .then(data => landLossLayer.addData(data));

    var restorationLayer = L.geoJSON(null, {
      style: {
        color: "green",
        weight: 3,
        fillColor: "green",
        fillOpacity: 0.5
      },
      onEachFeature: function(feature, layer) {
        layer.bindPopup(
          "<b>" + feature.properties.name + "</b><br>" +
          "Type: " + feature.properties.type + "<br>" +
          "Status: " + feature.properties.status
        );
      }
    }).addTo(map);

    fetch('data/restoration.geojson')
      .then(response => response.json())
      .then(data => restorationLayer.addData(data));

    var floodLayer = L.geoJSON(null, {
      style: {
        color: "purple",
        weight: 4,
        fillColor: "purple",
        fillOpacity: 1.7
      },
      onEachFeature: function(feature, layer) {
        layer.bindPopup(
          "<b>" + feature.properties.name + "</b><br>" +
          "Risk: " + feature.properties.risk + "<br>" +
          "Concern: " + feature.properties.concern
        );
      }
    }).addTo(map);

    fetch('data/flood.geojson')
      .then(response => response.json())
      .then(data => floodLayer.addData(data));
   
    var noaaLayer = L.tileLayer(
  'https://services2.arcgis.com/C8EMgrsFcRFL6LrL/arcgis/rest/services/South_Louisiana_Land_Loss_1932_to_2010/MapServer/tile/{z}/{y}/{x}',
  {
    opacity: 1.7,
    attribution: 'NOAA / USGS Land Loss'
  }
).addTo(map);
    var restorationLayer = L.tileLayer(
  'https://cimsgeo3.coastal.louisiana.gov/arcgis/rest/services/CPRA_Projects/MapServer/tile/{z}/{y}/{x}',
  {
    opacity: 1.7,
    attribution: 'CPRA Restoration Projects'
  }
);
    var futureLandChangeLayer = L.tileLayer.wms(
  "https://cimsgeo3.coastal.louisiana.gov/arcgis/services/mp_viewer_2017/Land_Change/MapServer/WMSServer",
  {
    layers: "0",
    format: "image/png",
    transparent: true,
    opacity: 1.9,
    attribution: "Louisiana Coastal Protection & Restoration Authority"
  }
);
    var overlayMaps = {
  "NOAA Land Loss Raster": noaaLayer,
  "Future Land Change (CPRA)": futureLandChangeLayer,
  "Restoration Projects": restorationLayer
};

L.control.layers(null, overlayMaps).addTo(map);
    var legend = L.control({ position: "bottomright" });

legend.onAdd = function (map) {
  var div = L.DomUtil.create("div", "info legend");

  div.innerHTML += "<h4>Legend</h4>";
  div.innerHTML += '<i style="background:red"></i> Land Loss<br>';
  div.innerHTML += '<i style="background:green"></i> Restoration<br>';
  div.innerHTML += '<i style="background:purple"></i> Flood Risk<br>';
  div.innerHTML += '<i style="background:black"></i> NOAA Raster';

  return div;
};

legend.addTo(map);
    futureLandChangeLayer.on("add", function () {
  futureLandChangeLayer.bringToFront();
});
  </script>

</body>
</html>
