<!DOCTYPE html>
<html>
<head>
  <title>Land Loss in Louisiana & Restoration Efforts</title>

  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <!-- ESRI Leaflet (for FEMA layer) -->
  <script src="https://unpkg.com/esri-leaflet/dist/esri-leaflet.js"></script>

  <style>
    body { margin:0; font-family: Arial; }
    #map { height: 90vh; }

    h1 {
      text-align: center;
      margin: 10px;
    }

    p {
      text-align: center;
      margin: 0;
      margin-bottom: 10px;
    }

    .legend {
      background: white;
      padding: 10px;
      line-height: 1.5em;
    }
  </style>
  .slider-box {
  text-align: center;
  background: white;
  padding: 8px;
  font-size: 14px;
}

#timeSlider {
  width: 250px;
  vertical-align: middle;
}
</head>

<body>

<h1>Land Loss in Louisiana & Restoration Efforts</h1>
<p>Explore coastal changes and environmental risk</p>
<div class="slider-box">
  <label for="timeSlider"><b>Land Change Time View:</b></label>
  <input type="range" id="timeSlider" min="0" max="1" value="0">
  <span id="timeLabel">Past Land Loss: 1932–2010</span>
</div>
<div id="map"></div>

<script>

var map = L.map('map').setView([29.5, -90.5], 7);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);



// 🌊 NOAA LAND LOSS
var noaaLayer = L.tileLayer(
  'https://services2.arcgis.com/C8EMgrsFcRFL6LrL/arcgis/rest/services/South_Louisiana_Land_Loss_1932_to_2010/MapServer/tile/{z}/{y}/{x}',
  {
    opacity: 1.7,
    attribution: 'NOAA / USGS Land Loss'
  }
).addTo(map);


// 🔮 FUTURE LAND CHANGE
var futureLandChangeLayer = L.tileLayer(
  'https://tiles.arcgis.com/tiles/XG15cJAlne2vxtgt/arcgis/rest/services/Land_Change___Future_With_Plan___20_Years_WTL1/MapServer/tile/{z}/{y}/{x}',
  {
    opacity: 1.7,
    attribution: 'CPRA Future Land Change'
  }
);


// 🌿 RESTORATION PROJECTS
var restorationLayer = L.tileLayer(
  'https://cimsgeo3.coastal.louisiana.gov/arcgis/rest/services/mp_viewer_2017/Projects/MapServer/tile/{z}/{y}/{x}',
  {
    opacity: 1.8,
    attribution: 'CPRA Restoration Projects'
  }
);


// 🌊 FEMA FLOOD ZONES
var floodLayer = L.esri.dynamicMapLayer({
  url: 'https://hazards.fema.gov/arcgis/rest/services/public/NFHL/MapServer',
  opacity: 1.6
});



// 🔘 LAYER CONTROL
var overlayMaps = {
  "NOAA Land Loss": noaaLayer,
  "Future Land Change": futureLandChangeLayer,
  "Restoration Projects": restorationLayer,
  "FEMA Flood Zones": floodLayer
};

L.control.layers(null, overlayMaps).addTo(map);



// 📊 LEGEND
var legend = L.control({ position: "bottomright" });

legend.onAdd = function () {
  var div = L.DomUtil.create("div", "legend");

  div.innerHTML += "<b>Legend</b><br>";
  div.innerHTML += '<i style="background:orange; width:10px; height:10px; display:inline-block;"></i> NOAA Land Loss<br>';
  div.innerHTML += '<i style="background:green; width:10px; height:10px; display:inline-block;"></i> Restoration Projects<br>';
  div.innerHTML += '<i style="background:blue; width:10px; height:10px; display:inline-block;"></i> Future Land Change<br>';
  div.innerHTML += '<i style="background:purple; width:10px; height:10px; display:inline-block;"></i> Flood Zones';

  return div;
};

legend.addTo(map);
var timeSlider = document.getElementById("timeSlider");
var timeLabel = document.getElementById("timeLabel");

timeSlider.addEventListener("input", function () {
  if (this.value == 0) {
    map.addLayer(noaaLayer);
    map.removeLayer(futureLandChangeLayer);
    timeLabel.textContent = "Past Land Loss: 1932–2010";
  } else {
    map.removeLayer(noaaLayer);
    map.addLayer(futureLandChangeLayer);
    timeLabel.textContent = "Projected Future Land Change";
  }
});
</script>

</body>
</html>
